name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --extra plot

      - name: Python compile check
        run: |
          uv run python -m py_compile \
            rng_tools/formula.py \
            rng_tools/io.py \
            rng_tools/network.py \
            rng_tools/reaction.py \
            scripts/rng_query_cli.py \
            scripts/webapp/server.py

      - name: CLI smoke test
        run: uv run ./run_cli.sh --help

      - name: Web API health smoke test
        run: |
          uv run python scripts/webapp/server.py --host 127.0.0.1 --port 8765 &
          pid=$!
          sleep 2
          curl --fail --silent --show-error --noproxy '*' "http://127.0.0.1:8765/api/health" >/dev/null
          kill "$pid"

      - name: Build packages
        run: uv build
